<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found</title>
    <meta name="robots" content="noindex,follow">
    <style>
      html, body {
        height: 100%;
        margin: 0;
        background: #000;
        color: #E8E6E3;
        font-family: 'Space Mono', monospace, system-ui;
        display: grid;
        place-items: center;
      }
      .box { 
        text-align: center; 
        padding: 40px;
        background: #111;
        border-radius: 15px;
        border: 1px solid #333;
      }
      h1 { font-size: 48px; margin-bottom: 10px; color: #ff0000; }
      p { color: rgba(255, 255, 255, 0.7); }
      .links { display: flex; gap: 20px; justify-content: center; margin-top: 30px; }
      a { color: #ff6500; text-decoration: none; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
      a:hover { color: #fff; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="box">
      <h1>404</h1>
      <p>This page has been removed or doesn't exist.</p>
      <div class="links">
        <a href="/">Homepage</a>
        <a href="/ravenreloaded">Raven Client</a>
      </div>
    </div>
  </body>
</html>
